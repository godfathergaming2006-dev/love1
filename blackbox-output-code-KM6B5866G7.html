<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖 Tere Liye Special | Surprise! 💕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .big-heart {
            font-size: 6rem;
            animation: heartbeat 1.2s ease-in-out infinite;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.8));
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .love-note {
            max-width: 650px;
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 40px;
            line-height: 1.7;
            font-size: 1.25rem;
            color: #333;
        }

        .love-note strong {
            color: #e91e63;
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
        }

        .buttons {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
        }

        .btn {
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Poppins', sans-serif;
            position: relative;
            overflow: hidden;
            min-width: 180px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-yes {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            box-shadow: 0 10px 30px rgba(255,65,108,0.4);
        }

        .btn-yes:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 20px 40px rgba(255,65,108,0.6);
        }

        .btn-maybe {
            background: linear-gradient(45deg, #f093fb, #f5576c);
            color: white;
            box-shadow: 0 10px 30px rgba(240,147,251,0.4);
        }

        .btn-maybe:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 20px 40px rgba(240,147,251,0.6);
        }

        .btn-no {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: white;
            box-shadow: 0 10px 30px rgba(79,172,254,0.4);
        }

        .btn-no:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 20px 40px rgba(79,172,254,0.6);
        }

        .response {
            min-height: 120px;
            font-size: 1.6rem;
            font-weight: 700;
            font-family: 'Dancing Script', cursive;
            margin: 30px 0;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .response.show {
            opacity: 1;
            transform: translateY(0);
        }

        .final-card {
            background: linear-gradient(135deg, rgba(255,107,107,0.95), rgba(255,182,193,0.95));
            color: white;
            padding: 35px;
            border-radius: 20px;
            margin-top: 25px;
            display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            max-width: 500px;
        }

        .final-card h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .footer {
            margin-top: 40px;
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
        }

        .footer a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .footer a:hover {
            background: rgba(255,255,255,0.4);
            transform: translateY(-2px);
        }

        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .big-heart { font-size: 4rem; }
            .love-note { padding: 25px; font-size: 1.1rem; }
            .buttons { flex-direction: column; gap: 15px; }
            .btn { width: 250px; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="floating-hearts" id="hearts"></div>

    <div class="container">
        <div class="big-heart">💖</div>
        <h1>Hey Meri Jaan! 💕</h1>
        
        <div class="love-note">
            Teri <strong>smile</strong> dekhkar dil dhadak jata hai... 
            <br><br>
            Tu room mein aaye toh saari <strong>lighting</strong> change ho jati hai! ✨
            <br><br>
            Bohot dino se dil mein kuch bola nahi tha... 
            <br><br>
            <strong>Tu bhi mere baare mein kuch feel karti hai? 💭</strong>
        </div>

        <div class="buttons" id="buttons">
            <button class="btn btn-yes" onclick="showAnswer('yes')">
                💖 Haan bilkul! 💖
            </button>
            <button class="btn btn-maybe" onclick="showAnswer('maybe')">
                🤔 Maybe... bata zyada
            </button>
            <button class="btn btn-no" onclick="showAnswer('no')">
                😊 Sweet hai tu!
            </button>
        </div>

        <div class="response" id="response"></div>
        <div class="final-card" id="finalCard">
            <h2 id="finalTitle"></h2>
            <p id="finalText"></p>
        </div>

        <div class="footer">
            💌 Made with ❤️ | 
            <a href="mailto:your-email@gmail.com?subject=Tera surprise!" target="_blank">
                Bata kaisa laga? 😊
            </a>
        </div>
    </div>

    <script>
        // Stars
        function createStars() {
            const stars = document.getElementById('stars');
            for(let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
                star.style.animationDelay = Math.random() * 3 + 's';
                stars.appendChild(star);
            }
        }

        // Floating hearts
        function createHeart() {
            const hearts = document.getElementById('hearts');
            const heart = document.createElement('div');
            heart.innerHTML = ['💖','💕','💗','💝','🌹'][Math.floor(Math.random()*5)];
            heart.style.position = 'absolute';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
            heart.style.animation = `floatUp ${Math.random() * 4 + 4}s linear`;
            hearts.appendChild(heart);
            
            setTimeout(() => heart.remove(), 8000);
        }

        // Main function
        function showAnswer(type) {
            const buttons = document.getElementById('buttons');
            const response = document.getElementById('response');
            const finalCard = document.getElementById('finalCard');
            const finalTitle = document.getElementById('finalTitle');
            const finalText = document.getElementById('finalText');

            buttons.style.opacity = '0';
            buttons.style.pointerEvents = 'none';

            setTimeout(() => {
                response.classList.add('show');
                
                if(type === 'yes') {
                    response.textContent = '🎉 DIL JEET GAYA BHAI! 💖💖💖';
                    finalTitle.innerHTML = 'Tu meri jaan ban gayi! 😍';
                    finalText.innerHTML = 'Ab officially baat karte hain! Call karun? 📞💕';
                } 
                else if(type === 'maybe') {
                    response.textContent = '😍 HO GAYA KAAM! 💃';
                    finalTitle.innerHTML = 'Chance mil gaya! 🌹';
                    finalText.innerHTML = 'Aur baat karein? Tujhe impress kar dunga! 😉';
                }
                else {
                    response.textContent = '😊 Dil jeet liya tune! ✨';
                    finalTitle.innerHTML = 'Respect bhai! 🙌';
                    finalText.innerHTML = 'Friendship forever! Tu best hai! 🤗';
                }

                finalCard.style.display = 'block';
                response.scrollIntoView({behavior: 'smooth'});
            }, 600);
        }

        // Initialize
        createStars();
        setInterval(createHeart, 800);

        // Click hearts
        document.addEventListener('click', (e) => {
            if(Math.random() < 0.4) createHeart();
        });
    </script>
</body>
</html>
